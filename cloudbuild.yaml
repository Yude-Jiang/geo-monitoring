# Cloud Build: 构建镜像。master 版本无 Firebase，无需注入 VITE_* 构建参数。
steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - "-t"
      - "asia-east1-docker.pkg.dev/$PROJECT_ID/geo-monitoring/app:latest"
      - "."

images:
  - "asia-east1-docker.pkg.dev/$PROJECT_ID/geo-monitoring/app:latest"

options:
  machineType: "E2_HIGHCPU_8"

timeout: "1800s"
